<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Solicitud</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 24px;
            background: #f4f6f8;
        }

        .contenedor {
            max-width: 760px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
            padding: 24px;
        }

        h1 {
            margin-top: 0;
            color: #1f2937;
        }

        p {
            color: #4b5563;
        }

        form p {
            margin-bottom: 14px;
        }

        label {
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
            color: #111827;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .errorlist {
            margin: 6px 0;
            padding: 10px;
            border-radius: 8px;
            background: #fee2e2;
            color: #991b1b;
            list-style: none;
        }

        button {
            background: #0f766e;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 12px 18px;
            cursor: pointer;
            font-weight: 600;
        }

        button:hover {
            background: #115e59;
        }
    </style>
</head>
<body>
    <main class="contenedor">
        <h1>Registro de Solicitud</h1>
        <p>Complete todos los campos requeridos y envie su solicitud.</p>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Enviar solicitud</button>
        </form>
    </main>
</body>
</html>
