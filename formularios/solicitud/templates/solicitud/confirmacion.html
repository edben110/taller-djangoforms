{% extends "solicitud/base.html" %}

{% block titulo %}Solicitud Registrada{% endblock %}

{% block contenido %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <div class="card border-0 shadow rounded-4">
            <div class="card-body py-5 px-4">
                <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
                <h2 class="mt-3 fw-bold">¡Solicitud enviada!</h2>
                <p class="text-muted mt-2 mb-4">
                    Su solicitud fue registrada con éxito en el sistema.
                </p>
                <a href="{% url 'solicitud:formulario' %}" class="btn btn-success btn-lg rounded-3">
                    <i class="bi bi-plus-circle me-2"></i>Registrar otra solicitud
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
