<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}Asistencia{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet">
</head>
<body class="bg-light min-vh-100 d-flex flex-column">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="{% url 'asistencia:registrar' %}">
                <i class="bi bi-clipboard-check fs-4"></i>
                <span>Sistema de Asistencia</span>
            </a>
        </div>
    </nav>

    <main class="flex-grow-1 py-5">
        <div class="container">
            {% block contenido %}{% endblock %}
        </div>
    </main>

    <footer class="bg-dark text-light text-center py-3 mt-auto">
        <small>Taller 2 &mdash; Django Formularios</small>
    </footer>

</body>
</html>
